<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>說說學伴 TalkyBuddy — 學生端</title>
<style>
/* ============ 基礎 & 版面（375px 直式手機優先） ============ */
:root{
  --cream:#fdf6e9;        /* 奶油底 */
  --cream-2:#f7ecd8;
  --ink:#4a3f35;
  --ink-soft:#8a7b6c;
  --card:#ffffff;
  --radius:22px;
  --led-idle:#2dd4d4;     /* 青 */
  --led-listen:#ff9a3c;   /* 橘 */
  --led-think:#a78bfa;    /* 紫 */
  --led-talk:#34d399;     /* 綠 */
  --accent:#ff8f66;
  --accent-2:#ffd166;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
  background:
    radial-gradient(circle at 20% 15%, #fff3d6 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, #ffe8d6 0%, transparent 45%),
    var(--cream);
  color:var(--ink);
  max-width:560px;margin:0 auto;
  display:flex;flex-direction:column;min-height:100dvh;
  user-select:none;-webkit-user-select:none;
}
/* ============ 頂部狀態列 ============ */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(253,246,233,.92);backdrop-filter:blur(6px);
  padding:8px 12px;border-bottom:2px dashed #e8d9bd;
}
.statusbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:999px;font-weight:700;font-size:12px;
  border:2px solid transparent;
}
.badge.edge{background:#e6f7f0;color:#0e7a55;border-color:#8fdcbe;}
.badge.cloud{background:#e8f0fe;color:#1a56b8;border-color:#9dbdf5;}
.badge .dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
.metric{color:var(--ink-soft);font-weight:600;}
.metric b{color:var(--ink);}
#connState{font-weight:700;}
#connState.ok{color:#0e7a55;}
#connState.bad{color:#c2410c;}
.statusbar .spacer{flex:1;}
a.teacher-link{
  color:#7c5cd6;text-decoration:none;font-weight:700;font-size:12px;
  padding:3px 8px;border-radius:999px;background:#efe9ff;
}
.device-note{font-size:10px;color:var(--ink-soft);margin-top:4px;text-align:center;}
/* 飛航模式開關 */
.airplane-row{
  display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px;
}
.airplane-label{font-size:14px;font-weight:800;}
.switch{
  position:relative;width:74px;height:36px;border-radius:999px;cursor:pointer;
  background:#d9cdb4;transition:background .25s;border:none;flex:none;
}
.switch::after{
  content:"";position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:50%;
  background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.25);transition:left .25s;
}
.switch.on{background:#0e7a55;}
.switch.on::after{left:42px;}
.switch:disabled{opacity:.5;cursor:wait;}
/* ============ 企鵝舞台 ============ */
.stage{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 12px 4px;
}
#penguinWrap{width:min(62vw,240px);touch-action:none;cursor:pointer;position:relative;}
#stateHint{
  font-size:13px;font-weight:700;color:var(--ink-soft);
  min-height:20px;text-align:center;margin-top:2px;
}
/* LED 呼吸燈動畫 */
@keyframes breathSlow{0%,100%{opacity:.35;r:16;}50%{opacity:1;}}
@keyframes blinkFast{0%,100%{opacity:.25;}50%{opacity:1;}}
@keyframes pulseThink{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes talkBeat{0%,100%{opacity:.6;transform:scale(1);}30%{opacity:1;transform:scale(1.15);}60%{opacity:.8;transform:scale(1.05);}}
#led{transform-origin:center;transform-box:fill-box;}
.st-idle   #led{fill:var(--led-idle);animation:breathSlow 3.2s ease-in-out infinite;}
.st-listen #led{fill:var(--led-listen);animation:blinkFast .55s linear infinite;}
.st-think  #led{fill:var(--led-think);animation:pulseThink 1.1s ease-in-out infinite;}
.st-talk   #led{fill:var(--led-talk);animation:talkBeat .5s ease-in-out infinite;}
#ledGlow{transform-origin:center;transform-box:fill-box;}
.st-idle   #ledGlow{fill:var(--led-idle);animation:breathSlow 3.2s ease-in-out infinite;}
.st-listen #ledGlow{fill:var(--led-listen);animation:blinkFast .55s linear infinite;}
.st-think  #ledGlow{fill:var(--led-think);animation:pulseThink 1.1s ease-in-out infinite;}
.st-talk   #ledGlow{fill:var(--led-talk);animation:talkBeat .5s ease-in-out infinite;}
/* 眨眼：聆聽時 */
@keyframes blinkEyes{0%,88%,100%{transform:scaleY(1);}92%,96%{transform:scaleY(.08);}}
.eye{transform-origin:center;transform-box:fill-box;}
.st-listen .eye{animation:blinkEyes 1.6s ease-in-out infinite;}
/* 嘴巴開合：說話時 */
@keyframes mouthTalk{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}
#mouthOpen{transform-origin:center;transform-box:fill-box;transform:scaleY(.25);opacity:0;transition:opacity .15s;}
.st-talk #mouthOpen{opacity:1;animation:mouthTalk .34s ease-in-out infinite;}
.st-talk #beak{opacity:0;}
/* 按住肚子時輕微縮放 */
#penguinWrap.pressing svg{transform:scale(.96);}
#penguinWrap svg{transition:transform .12s;display:block;width:100%;height:auto;}
.hold-hint{
  font-size:15px;font-weight:800;color:#b45309;background:#fff3d6;
  border:2px dashed #f0c060;border-radius:16px;padding:6px 14px;margin-top:6px;
  text-align:center;
}
.hold-hint.disabled{color:#9a3412;background:#ffe4d6;border-color:#f5a06e;}
/* ============ 對話氣泡串 ============ */
main{flex:1;overflow-y:auto;padding:10px 14px 8px;display:flex;flex-direction:column;gap:10px;}
.bubble{
  max-width:82%;padding:10px 14px;border-radius:var(--radius);
  font-size:15px;line-height:1.5;word-break:break-word;
  box-shadow:0 2px 6px rgba(120,90,40,.08);position:relative;
  animation:pop .18s ease-out;
}
@keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.bubble.penguin{align-self:flex-start;background:var(--card);border-bottom-left-radius:6px;border:2px solid #f0e4cc;}
.bubble.student{align-self:flex-end;background:#dff1ff;border-bottom-right-radius:6px;border:2px solid #b8dff7;}
.bubble.interim{opacity:.65;font-style:italic;}
.bubble.fallback{background:#fff1e6;border:2px dashed #f5a06e;}
.bubble .tag{
  display:inline-block;font-size:10px;font-weight:800;color:#c2410c;
  background:#ffe0cc;border-radius:999px;padding:1px 8px;margin-bottom:4px;
}
.bubble .who{font-size:10px;font-weight:800;color:var(--ink-soft);margin-bottom:2px;}
.bubble .scores{
  margin-top:6px;font-size:10px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;
}
/* ============ 快速語句列 ============ */
.quickbar{
  padding:8px 10px 6px;border-top:2px dashed #e8d9bd;background:var(--cream-2);
}
.quickbar h3{font-size:12px;color:var(--ink-soft);margin:0 4px 6px;font-weight:800;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;}
.chip{
  flex:none;font-size:14px;font-weight:700;color:var(--ink);
  background:#fff;border:2px solid var(--accent-2);border-radius:999px;
  padding:9px 16px;cursor:pointer;font-family:inherit;
  box-shadow:0 2px 0 #eccf8e;transition:transform .08s;
}
.chip:active{transform:translateY(2px);box-shadow:none;}
.chip:disabled{opacity:.45;}
/* ============ Toast & 同步動畫 ============ */
#toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:#3b2f63;color:#fff;font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;z-index:50;max-width:90%;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes syncFly{
  0%{transform:translate(-50%,0) scale(.6);opacity:0;}
  20%{opacity:1;}
  100%{transform:translate(-50%,-120px) scale(1.1);opacity:0;}
}
.sync-fx{
  position:fixed;left:50%;top:55%;font-size:34px;z-index:49;pointer-events:none;
  animation:syncFly 1.4s ease-out forwards;
}
</style>
</head>
<body class="st-idle" id="body">

<header>
  <div class="statusbar">
    <span class="badge edge" id="modeBadge"><span class="dot"></span><span id="modeText">edge</span></span>
    <span class="metric">延遲 <b id="latency">--</b> ms</span>

<div class="stage">
  <div id="penguinWrap" aria-label="按住企鵝肚子說話">

    <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="企鵝學伴">

        <radialGradient id="bodyGrad" cx="50%" cy="38%" r="72%">

          <stop offset="100%" stop-color="#3c4a68"/>

  </div>
  <div id="stateHint">待機中，按住肚子開始說話</div>

  <h3>快速語句（點一下就送出）</h3>
  <div class="chips" id="chips"></div>

<script>
"use strict";
/* ================================================================
 * 說說學伴 TalkyBuddy — 學生端前端
 * WS 協定見 CONTRACTS.md：/ws/talk
 * ================================================================ */

/* ---------- DOM 快取 ---------- */
var body = document.getElementById("body");
var chatEl = document.getElementById("chat");
var chipsEl = document.getElementById("chips");
var connStateEl = document.getElementById("connState");
var latencyEl = document.getElementById("latency");
var pendingEl = document.getElementById("pending");
var modeBadge = document.getElementById("modeBadge");
var modeText = document.getElementById("modeText");
var airplaneSwitch = document.getElementById("airplaneSwitch");
var airplaneState = document.getElementById("airplaneState");
var penguinWrap = document.getElementById("penguinWrap");
var stateHint = document.getElementById("stateHint");
var holdHint = document.getElementById("holdHint");
var toastEl = document.getElementById("toast");

/* ---------- 全域狀態 ---------- */
var ws = null;
var wsReady = false;
var reconnectAttempt = 0;
var reconnectTimer = null;
var micAvailable = false;       // getUserMedia 是否可用
var mediaStream = null;
var mediaRecorder = null;
var recChunks = [];
var recording = false;
var busy = false;               // 一輪進行中（半雙工）
var playingTTS = false;         // TTS 播放中鎖 push-to-talk
var interimBubble = null;       // asr_result 即時上屏氣泡
var networkMode = "edge";

/* ---------- 視覺狀態機 ---------- */
/* 狀態 → body class：idle=青色慢呼吸 / listen=橘快閃 / think=紫 / talk=綠律動 */
function setVisualState(s) {
  body.classList.remove("st-idle", "st-listen", "st-think", "st-talk");
  var map = {
    idle:   ["st-idle",   "待機中，按住肚子開始說話"],
    listen: ["st-listen", "我在聽～說給我聽！"],
    think:  ["st-think",  "嗯…我想一想…"],
    talk:   ["st-talk",   "換我說囉！"]
  };
  var entry = map[s] || map.idle;
  body.classList.add(entry[0]);
  stateHint.textContent = entry[1];
}

/* ---------- Toast ---------- */
var toastTimer = null;
function showToast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  if (toastTimer) { clearTimeout(toastTimer); }
  toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, ms || 3200);
}

/* 同步動畫：小雲朵飛上去 */
function playSyncFx() {
  var i;
  for (i = 0; i < 3; i++) {
    (function (idx) {
      setTimeout(function () {
        var el = document.createElement("div");
        el.className = "sync-fx";
        el.textContent = "☁️";
        el.style.left = (42 + idx * 8) + "%";
        document.body.appendChild(el);
        setTimeout(function () { el.remove(); }, 1500);
      }, idx * 220);
    })(i);
  }
}

/* ---------- 對話氣泡 ---------- */
function addBubble(who, text, opts) {
  opts = opts || {};
  var div = document.createElement("div");
  div.className = "bubble " + (who === "student" ? "student" : "penguin");
  if (opts.interim) { div.classList.add("interim"); }
  if (opts.fallback) { div.classList.add("fallback"); }
  var whoTag = document.createElement("div");
  whoTag.className = "who";
  whoTag.textContent = who === "student" ? "我" : "企鵝學伴";
  div.appendChild(whoTag);
  if (opts.fallback) {
    var tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = "再說一次";
    div.appendChild(tag);
    div.appendChild(document.createElement("br"));
  }
  var span = document.createElement("span");
  span.textContent = text;
  div.appendChild(span);
  if (opts.scores) {
    var sc = document.createElement("div");
    sc.className = "scores";
    sc.textContent = "流暢 " + (opts.scores.fluency != null ? opts.scores.fluency : "-") +
      "｜詞彙 " + (opts.scores.vocabulary != null ? opts.scores.vocabulary : "-") +
      "｜文法 " + (opts.scores.grammar != null ? opts.scores.grammar : "-");
    div.appendChild(sc);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

/* ---------- WebSocket 連線（指數退避重連） ---------- */
function wsURL() {
  var proto = location.protocol === "https:" ? "wss://" : "ws://";
  return proto + location.host + "/ws/talk";
}

function connectWS() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  connStateEl.textContent = "連線中…";
  connStateEl.className = "bad";
  try {
    ws = new WebSocket(wsURL());
  } catch (e) {
    scheduleReconnect();
    return;
  }
  ws.binaryType = "arraybuffer";
  ws.onopen = function () {
    wsReady = true;
    reconnectAttempt = 0;
    connStateEl.textContent = "已連線";
    connStateEl.className = "ok";
  };
  ws.onclose = function () {
    wsReady = false;
    connStateEl.textContent = "已斷線";
    connStateEl.className = "bad";
    busy = false;
    setVisualState("idle");
    scheduleReconnect();
  };
  ws.onerror = function () {
    /* onclose 會接手重連 */
  };
  ws.onmessage = function (ev) {
    if (typeof ev.data !== "string") { return; }
    var msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    handleServerMsg(msg);
  };
}

function scheduleReconnect() {
  reconnectAttempt += 1;
  var delay = Math.min(30000, 1000 * Math.pow(2, reconnectAttempt - 1)); /* 1s,2s,4s,...上限30s */
  connStateEl.textContent = "斷線，" + Math.round(delay / 1000) + " 秒後重連…";
  connStateEl.className = "bad";
  reconnectTimer = setTimeout(connectWS, delay);
}

/* ---------- 伺服器訊息處理 ---------- */
function handleServerMsg(msg) {
  switch (msg.type) {
    case "state":
      if (msg.state === "asr" || msg.state === "thinking") {
        setVisualState("think");
      } else if (msg.state === "tts") {
        setVisualState("talk");
      } else if (msg.state === "idle") {
        if (!playingTTS) { setVisualState("idle"); busy = false; }
      }
      break;

    case "asr_result":
      /* 即時上屏：學生氣泡 */
      if (interimBubble) {
        interimBubble.classList.remove("interim");
        interimBubble.querySelector("span").textContent = msg.text;
      } else {
        interimBubble = addBubble("student", msg.text, {});
      }
      interimBubble = null;
      break;

    case "reply":
      addBubble("penguin", msg.text, {
        fallback: !!msg.fallback,
        scores: msg.fallback ? null : msg.scores
      });
      if (msg.latency_ms && msg.latency_ms.round_total != null) {
        latencyEl.textContent = String(msg.latency_ms.round_total);
      }
      lastReplyText = msg.text;
      refreshStatus();
      break;

    case "tts_audio":
      playTTS(msg.wav_b64);
      break;

    case "tts_unavailable":
      speakFallback(lastReplyText);
      break;

    case "busy":
      showToast("我還在回上一句喔，等我一下！");
      break;

    default:
      break;
  }
}

var lastReplyText = "";

/* ---------- TTS 播放（半雙工：播放期間鎖 push-to-talk） ---------- */
function playTTS(wavB64) {
  if (!wavB64) { ttsDone(); return; }
  playingTTS = true;
  setVisualState("talk");
  var audio = new Audio("data:audio/wav;base64," + wavB64);
  audio.onended = ttsDone;
  audio.onerror = ttsDone;
  var p = audio.play();
  if (p && typeof p.catch === "function") {
    p.catch(function () {
      /* 自動播放被擋 → 改用 speechSynthesis 或直接結束 */
      speakFallback(lastReplyText);
    });
  }
}

function ttsDone() {
  playingTTS = false;
  busy = false;
  setVisualState("idle");
}

/* speechSynthesis 降級：中英分段唸；無 API 則僅顯示文字 */
function speakFallback(text) {
  if (typeof speechSynthesis === "undefined" || typeof SpeechSynthesisUtterance === "undefined") {
    ttsDone();
    return;
  }
  var segs = splitZhEn(text);
  if (segs.length === 0) { ttsDone(); return; }
  playingTTS = true;
  setVisualState("talk");
  var idx = 0;
  function next() {
    if (idx >= segs.length) { ttsDone(); return; }
    var seg = segs[idx]; idx += 1;
    var u = new SpeechSynthesisUtterance(seg.text);
    u.lang = seg.lang === "zh" ? "zh-TW" : "en-US";
    u.rate = 0.95;
    u.onend = next;
    u.onerror = next;
    speechSynthesis.speak(u);
  }
  try {
    speechSynthesis.cancel();
    next();
  } catch (e) {
    ttsDone();
  }
}

/* 簡易中英分段（供 speechSynthesis） */
function splitZhEn(text) {
  var segs = [];
  if (!text) { return segs; }
  var cur = "";
  var curLang = null;
  var i, ch, lang;
  for (i = 0; i < text.length; i++) {
    ch = text[i];
    if (/[一-鿿㐀-䶿！-～　-〿]/.test(ch)) {
      lang = "zh";
    } else if (/[A-Za-z]/.test(ch)) {
      lang = "en";
    } else {
      lang = curLang; /* 標點/空白跟前段 */
    }
    if (lang !== curLang && cur.trim() !== "" && lang !== null && curLang !== null) {
      segs.push({ lang: curLang, text: cur.trim() });
      cur = "";
    }
    cur += ch;
    if (lang !== null) { curLang = lang; }
  }
  if (cur.trim() !== "" && curLang !== null) {
    segs.push({ lang: curLang, text: cur.trim() });
  }
  return segs;
}

/* ---------- 快速語句 ---------- */
var QUICK_PHRASES = [
  "I want to eat 蘋果",
  "我想要 go to school",
  "This is my 書包",
  "我喜歡 dog",
  "Can I have 水？",
  "老師 good morning"
];

function buildChips() {
  QUICK_PHRASES.forEach(function (phrase) {
    var btn = document.createElement("button");
    btn.className = "chip";
    btn.type = "button";
    btn.textContent = phrase;
    btn.addEventListener("click", function () {
      sendText(phrase);
    });
    chipsEl.appendChild(btn);
  });
}

function sendText(text) {
  if (!wsReady) { showToast("尚未連線，請稍候…"); return; }
  if (busy || playingTTS) { showToast("等企鵝說完再換你喔！"); return; }
  busy = true;
  addBubble("student", text, {});
  setVisualState("think");
  ws.send(JSON.stringify({ type: "text_input", text: text }));
}

/* ---------- Push-to-talk（MediaRecorder → WS binary） ---------- */
function pickMime() {
  if (typeof MediaRecorder === "undefined") { return null; }
  if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) {
    return "audio/webm;codecs=opus";
  }
  if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported("audio/ogg;codecs=opus")) {
    return "audio/ogg;codecs=opus";
  }
  if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported("audio/webm")) {
    return "audio/webm";
  }
  return null;
}

function initMic() {
  var secure = (typeof isSecureContext !== "undefined" ? isSecureContext : (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1"));
  if (!secure || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || pickMime() === null) {
    micDisabled();
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
    mediaStream = stream;
    micAvailable = true;
    holdHint.textContent = "👋 按住企鵝肚子說話，放開送出";
    holdHint.classList.remove("disabled");
  }).catch(function () {
    micDisabled();
  });
}

function micDisabled() {
  micAvailable = false;
  holdHint.textContent = "🎤 麥克風不可用，請用下方快速語句";
  holdHint.classList.add("disabled");
}

function startRecording() {
  if (!micAvailable || !mediaStream) { return; }
  if (recording || busy || playingTTS) {
    if (busy || playingTTS) { showToast("等企鵝說完再換你喔！"); }
    return;
  }
  if (!wsReady) { showToast("尚未連線，請稍候…"); return; }
  var mime = pickMime();
  recChunks = [];
  try {
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mime });
  } catch (e) {
    micDisabled();
    return;
  }
  mediaRecorder.ondataavailable = function (ev) {
    if (ev.data && ev.data.size > 0) { recChunks.push(ev.data); }
  };
  mediaRecorder.onstop = function () {
    var blob = new Blob(recChunks, { type: mime });
    recChunks = [];
    if (blob.size < 200) {
      /* 太短視為誤觸 */
      setVisualState("idle");
      return;
    }
    if (!wsReady) { setVisualState("idle"); showToast("斷線了，錄音沒送出"); return; }
    busy = true;
    setVisualState("think");
    interimBubble = addBubble("student", "（辨識中…）", { interim: true });
    blob.arrayBuffer().then(function (buf) {
      ws.send(buf);                                   /* 單一 binary frame */
      ws.send(JSON.stringify({ type: "audio_end" })); /* 結束標記 */
    });
  };
  recording = true;
  penguinWrap.classList.add("pressing");
  setVisualState("listen");
  mediaRecorder.start();
}

function stopRecording() {
  penguinWrap.classList.remove("pressing");
  if (!recording) { return; }
  recording = false;
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
}

/* pointer + touch 事件；防長按選單 */
penguinWrap.addEventListener("contextmenu", function (e) { e.preventDefault(); });
penguinWrap.addEventListener("pointerdown", function (e) {
  e.preventDefault();
  if (!micAvailable) { showToast("麥克風不可用，請點下方快速語句"); return; }
  startRecording();
});
penguinWrap.addEventListener("pointerup", function (e) { e.preventDefault(); stopRecording(); });
penguinWrap.addEventListener("pointercancel", function () { stopRecording(); });
penguinWrap.addEventListener("pointerleave", function () { if (recording) { stopRecording(); } });
/* iOS Safari 舊版 touch 後援（pointer 事件已涵蓋新版） */
penguinWrap.addEventListener("touchstart", function (e) {
  if (typeof PointerEvent === "undefined") {
    e.preventDefault();
    if (micAvailable) { startRecording(); }
  }
}, { passive: false });
penguinWrap.addEventListener("touchend", function (e) {
  if (typeof PointerEvent === "undefined") {
    e.preventDefault();
    stopRecording();
  }
}, { passive: false });

/* ---------- /api/status 輪詢（每 5 秒） ---------- */
function refreshStatus() {
  fetch("/api/status").then(function (r) { return r.json(); }).then(function (st) {
    pendingEl.textContent = String(st.pending != null ? st.pending : 0);
    applyMode(st.network_mode || "edge");
  }).catch(function () { /* 離線時忽略 */ });
}

function applyMode(mode) {
  networkMode = mode;
  modeText.textContent = mode;
  modeBadge.className = "badge " + (mode === "cloud" ? "cloud" : "edge");
  /* 飛航模式開 = edge（斷雲端）；關 = cloud */
  if (mode === "edge") {
    airplaneSwitch.classList.add("on");
    airplaneState.textContent = "邊緣模式";
  } else {
    airplaneSwitch.classList.remove("on");
    airplaneState.textContent = "雲端連線";
  }
}

/* ---------- 飛航模式開關 ---------- */
airplaneSwitch.addEventListener("click", function () {
  var target = networkMode === "edge" ? "cloud" : "edge";
  airplaneSwitch.disabled = true;
  fetch("/api/network_mode", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mode: target })
  }).then(function (r) { return r.json(); }).then(function (res) {
    applyMode(target);
    if (target === "cloud") {
      if (res && res.new_diagnosis) {
        playSyncFx();
        showToast("☁️ 已同步 " + (res.synced != null ? res.synced : 0) + " 筆｜Hermes Agent 已產出最新診斷", 4200);
      } else {
        showToast("已切回雲端連線");
      }
    } else {
      showToast("✈️ 飛航模式開啟，改用邊緣端運算");
    }
    refreshStatus();
  }).catch(function () {
    showToast("切換失敗，請再試一次");
  }).finally(function () {
    airplaneSwitch.disabled = false;
  });
});

/* ---------- 啟動 ---------- */
buildChips();
setVisualState("idle");
connectWS();
initMic();
refreshStatus();
setInterval(refreshStatus, 5000);

/* 開場招呼 */
addBubble("penguin", "嘿！我是你的說說學伴！按住我的肚子跟我說話，或點下面的快速語句試試看～", {});
</script>
